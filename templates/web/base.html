<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Job Board{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><span>Meri</span> Naukri — My Job Board</h1>
            <div style="display:flex;gap:8px;">
                <a href="/" class="btn" style="color:#1a1a2e;background:#4fc3f7;font-weight:600;">Dashboard</a>
                <a href="/profile" class="btn" style="color:#fff;background:transparent;border:1px solid #4fc3f7;font-weight:600;">Profile</a>
            </div>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
